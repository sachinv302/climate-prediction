<!DOCTYPE html>
<html>
<head>
    <title>Climate Risk Intelligence</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Chart & Map -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>
<div class="particles"></div>

<div class="card">
    <h1>🌍 Climate Risk Intelligence</h1>

    <div class="controls">
        <input type="text" id="city" placeholder="Enter City (e.g. Mysore,IN)">
        <button onclick="getClimate()">Analyze</button>
        <button onclick="refreshPage()" class="refresh">Refresh</button>
    </div>

    <div id="result" class="fade"></div>

    <div class="progress">
        <div id="riskFill" class="progress-bar"></div>
    </div>

    <div class="suggestion">
        <h3>💡 Suggestion</h3>
        <div id="suggestionText"></div>
    </div>

    <div id="map"></div>
    <canvas id="tempChart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
